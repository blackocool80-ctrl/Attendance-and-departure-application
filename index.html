<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق الحضور المركزي بالبصمة</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js"></script>
    <style>
        body { font-family: 'Tahoma', Arial, sans-serif; background: #f4f6fa; margin:0; padding:0;}
        .container { max-width:450px; margin:24px auto; background:#fff; border-radius:18px; padding:16px; box-shadow:0 2px 14px rgba(102,126,234,0.12);}
        h1 { color:#764ba2; font-size:22px; margin-bottom:10px; text-align:center;}
        .inputSection {margin-bottom:20px;text-align:center;}
        .inputSection input {padding:10px 8px;border-radius:7px;border:1px solid #bdbdbd;font-size:16px;width:84%;}
        .btn {padding:14px 12px;font-size:16px;border:none;border-radius:9px;background:#667eea;color:#fff;font-weight:700;margin:6px 0;cursor:pointer;}
        .btn:disabled {background:#b4b4b4;}
        .statusMsg { color:#f97316; margin:10px 0;}
        .record-box {margin:8px 0;background:#f8fafc;padding:12px;border-radius:9px;}
        .admin-btn {position:fixed; bottom:18px; left:18px; background:linear-gradient(135deg, #667eea 0%, #764ba2 100%); color:#fff;border:none;border-radius:35px;padding:10px 18px;font-size:17px;font-weight:700;cursor:pointer;z-index:999;}
        .modal {position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.2);display:none;justify-content:center;align-items:center;z-index:1999;}
        .modal.active {display:flex;}
        .modal-content {background:#fff;border-radius:18px;padding:25px 18px;width:95%;max-width:500px;}
        .modal-content h2 {font-size:19px;margin-bottom:9px;}
        .admin-table {width:100%;border-collapse:collapse;font-size:13px;}
        .admin-table th, .admin-table td {border:1px solid #eee;padding:4px 1px;text-align:center;}
        .admin-table th {background:#f3f4f6;}
        .admin-logout {margin:7px auto;background:#ef4444;color:#fff;border:none;border-radius:7px;padding:7px 14px;font-size:15px;}
        .admin-export {margin: 6px auto; background:#22c55e;color:#fff;border:none;padding:7px 18px;border-radius:8px;cursor:pointer;}
        .status.correct {color:#22c55e;}
        .status.delay {color:#f59e0b;}
        .status.early {color:#d97706;}
        .status.extra {color:#10b981;}
        .status.wrong {color:#ef4444;}
        .msg {color:#ef4444;}
    </style>
</head>
<body>
<div class="container">
    <h1>تسجيل الحضور بالبصمة</h1>
    <div class="inputSection">
        <input type="text" id="empName" placeholder="ادخل اسمك...">
        <select id="empBranch">
            <option value="">اختر المقر</option>
            <option value="الصناعية الدمام">الصناعية الدمام</option>
            <option value="الهاف مون">الهاف مون</option>
        </select>
        <br>
        <button class="btn" id="fingerBtn">تسجيل بالبصمة</button>
        <div id="statusMsg" class="statusMsg"></div>
    </div>
    <!-- سجل الموظف اليومي -->
    <div id="myRecords"></div>
</div>
<!-- زر الإدارة -->
<button class="admin-btn" onclick="openAdmin()">⚙️ الإدارة</button>
<!-- نافذة الإدارة -->
<div class="modal" id="adminModal">
    <div class="modal-content">
        <div id="adminLoginBox">
            <h2>دخول المدير</h2>
            <input type="password" id="adminPass" placeholder="رمز الدخول">
            <button class="btn" onclick="adminLogin()">دخول</button>
            <div id="adminMsg" class="msg"></div>
        </div>
        <div id="adminPanel" style="display:none;">
            <button class="admin-logout" onclick="closeAdmin()">خروج</button>
            <div style="margin-top:10px;">
                <button class="admin-export" onclick="exportReport()">تصدير Excel</button>
            </div>
            <div id="adminTableBox"></div>
        </div>
    </div>
</div>
<script>
/* firebase config */
const firebaseConfig = {
    apiKey: "AIzaSyBJZ1zsb45j8jQVNbt-_Is0VZPS_2hTpzk",
    authDomain: "attendance-dammam2026.firebaseapp.com",
    projectId: "attendance-dammam2026"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* إعدادات الحضور */
const ADMIN_PASS = "Falcon80";
const NORMAL_FROM = "07:30"; // دوام عادي يبدأ
const NORMAL_TO = "15:30";   // دوام ينتهي
const NORMAL_HOURS = 8;
const RAMADAN_FROM = "08:00"; // رمضان يبدأ
const RAMADAN_TO = "14:00";   // رمضان ينتهي
const RAMADAN_HOURS = 6;
const FIVE_MINUTES_MS = 5*60*1000; // 5 دقائق

/* وقت اليوم هل رمضان أم لا */
function isRamadanMonth(dt) {
    // رمضان 2026: من 28 فبراير حتى 29 مارس (عدل عند سنوات جديدة!)
    let m = dt.getMonth() + 1, d = dt.getDate(), y = dt.getFullYear();
    return y==2026 && ((m==2&&d>=28) || (m==3&&d<=29));
}

/* حساب الفرق بين وقتين (returns دقائق) */
function diffMinutes(t1, t2) {
    let [h1,m1]=t1.split(':').map(Number), [h2,m2]=t2.split(':').map(Number);
    return (h2*60+m2) - (h1*60+m1);
}

/* زر البصمة */
document.getElementById("fingerBtn").onclick = async function() {
    let name = document.getElementById("empName").value.trim();
    let branch = document.getElementById("empBranch").value;
    if(!name){showMsg("الرجاء ادخال الاسم!");return;}
    if(!branch){showMsg("اختر المقر!");return;}
    let today = new Date(), todayStr = today.toLocaleDateString('ar-SA');
    let ramadan = isRamadanMonth(today);
    // تحقق من آخر سجل لنفس الموظف اليوم
    let records = await getEmployeeTodayRecords(name, todayStr);
    let last = records[records.length-1];
    let action = (!last || last.type==="checkout") ? "checkin" : "checkout";
    let nowTime = today.toLocaleTimeString('ar-SA',{ hour12:false, hour:'2-digit', minute:'2-digit' });
    // منع تكرار الحركة خلال أقل من 5 دقائق
    if(last && last.type === action) {
        let lastStamp = last.timestamp;
        if(today.getTime() - lastStamp < FIVE_MINUTES_MS) {
            showMsg("لا يمكن تكرار نفس الحركة خلال 5 دقائق!", true);
            return;
        }
    }
    // جلب وحفظ السجل المركزي
    let record = {
        name, branch, date: todayStr, type: action,
        time: nowTime, timestamp: today.getTime(), method:"biometric"
    };
    await db.collection("attendance").add(record);
    showMsg(`تم تسجيل ${action==="checkin"?"الدخول":"الخروج"} بنجاح!`, false);
    showMyRecords();
};

/* عرض سجل الموظف اليومي */
async function showMyRecords() {
    let name = document.getElementById("empName").value.trim();
    let today = new Date(), todayStr = today.toLocaleDateString('ar-SA');
    let container = document.getElementById("myRecords");
    container.innerHTML = "";
    if(!name) return;
    let records = await getEmployeeTodayRecords(name, todayStr);
    if(records.length==0) return;
    records.forEach(r=>{
        container.innerHTML += `
            <div class="record-box">
                ${r.type==="checkin"?"دخول":"خروج"}<br>
                الوقت: ${r.time}<br>
                المقر: ${r.branch}
            </div>
        `;
    });
}

/* جلب السجل المركزي للموظف اليوم */
async function getEmployeeTodayRecords(name, dateStr) {
    let q = await db.collection("attendance")
                    .where("name","==",name)
                    .where("date","==",dateStr)
                    .orderBy("timestamp")
                    .get();
    let arr = [];
    q.forEach(doc=>arr.push(doc.data()));
    return arr;
}

/* رسائل */
function showMsg(msg, error=false) {
    let box = document.getElementById("statusMsg");
    box.textContent = msg;
    box.style.color = error ? "#ef4444" : "#667eea";
    setTimeout(()=>{box.textContent="";},2500);
}

/* تحديث سجل الموظف تلقائي عند تغيير الاسم */
document.getElementById("empName").oninput = showMyRecords;

/* ====== لوحة المدير ====== */
function openAdmin() {
    document.getElementById("adminModal").classList.add("active");
    document.getElementById("adminLoginBox").style.display = "block";
    document.getElementById("adminPanel").style.display = "none";
    document.getElementById("adminPass").value = "";
    document.getElementById("adminMsg").textContent = "";
}
function closeAdmin() {
    document.getElementById("adminModal").classList.remove("active");
    document.getElementById("adminPanel").style.display = "none";
    document.getElementById("adminLoginBox").style.display = "block";
    document.getElementById("adminPass").value = "";
}
async function adminLogin() {
    let pass = document.getElementById("adminPass").value;
    if(pass !== ADMIN_PASS) {
        document.getElementById("adminMsg").textContent = "رمز الدخول غير صحيح!";
        return;
    }
    document.getElementById("adminLoginBox").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
    await showAdminTable();
}

/* عرض جدول كل السجلات */
async function showAdminTable() {
    // كل سجل attendance في السحابة
    let q = await db.collection("attendance").orderBy("timestamp").get();
    let arr=[]; q.forEach(doc=>arr.push(doc.data()));
    // تجميع السجلات حسب الموظف والتاريخ
    let map={}; arr.forEach(r=>{
        let key = r.name+"|"+r.date;
        if(!map[key]) map[key]={};
        map[key][r.type] = r;
    });
    // بناء الجدول
    let html = `<table class="admin-table"><tr>
    <th>اسم الموظف</th><th>المقر</th><th>التاريخ</th><th>دخول</th><th>خروج</th>
    <th>ساعات العمل</th><th>الإضافي</th><th>حالة الدوام</th></tr>`;
    for(let key in map) {
        let rec = map[key], checkin=rec.checkin, checkout=rec.checkout;
        if(checkin) {
            let name=checkin.name, branch=checkin.branch, date=checkin.date, inTime=checkin.time, outTime=checkout?checkout.time:"--";
            let duration=checkout?diffMinutes(inTime,outTime):0;
            let now = new Date(date.split('/').reverse().join('-'));
            let isRamadan=isRamadanMonth(now);
            let allowed=isRamadan?RAMADAN_HOURS:NORMAL_HOURS;
            let overtime = duration>allowed*60 ? duration-allowed*60 : 0;
            let extra = overtime>0 ? `${Math.floor(overtime/60)}س ${overtime%60}د` : "-";
            let inAllowed=(isRamadan?RAMADAN_FROM:NORMAL_FROM), outAllowed=(isRamadan?RAMADAN_TO:NORMAL_TO);
            let delay = diffMinutes(inAllowed,inTime)>0 ? `${diffMinutes(inAllowed,inTime)} د تأخير` : "";
            let early = checkout && diffMinutes(outTime,outAllowed)>0 ? `${diffMinutes(outTime,outAllowed)} د خروج مبكر` : "";
            let status = (!delay&&!early)?"✔️ صحيح":`${delay}${early?" / "+early:""}`;
            html += `<tr>
                <td>${name}</td><td>${branch}</td><td>${date}</td>
                <td>${inTime}</td><td>${outTime}</td>
                <td>${duration>0?Math.floor(duration/60)+":"+(duration%60).toString().padStart(2,'0'):"--"}</td>
                <td>${extra}</td>
                <td>${status}</td>
            </tr>`;
        }
    }
    html += "</table>";
    document.getElementById("adminTableBox").innerHTML = html;
}

/* تصدير تقرير Excel */
async function exportReport() {
    let q = await db.collection("attendance").orderBy("timestamp").get();
    let arr=[]; q.forEach(doc=>arr.push(doc.data()));
    let csv = 'اسم الموظف,المقر,التاريخ,دخول,خروج,ساعات العمل,الإضافي,حالة الدوام\n';
    let map={}; arr.forEach(r=>{
        let key = r.name+"|"+r.date;
        if(!map[key]) map[key]={};
        map[key][r.type]=r;
    });
    for(let key in map) {
        let rec=map[key],checkin=rec.checkin,checkout=rec.checkout;
        if(checkin){
            let name=checkin.name,branch=checkin.branch,date=checkin.date,inTime=checkin.time,outTime=checkout?checkout.time:"--";
            let duration=checkout?diffMinutes(inTime,outTime):0;
            let now = new Date(date.split('/').reverse().join('-'));
            let isRamadan=isRamadanMonth(now);
            let allowed=isRamadan?RAMADAN_HOURS:NORMAL_HOURS;
            let overtime = duration>allowed*60 ? duration-allowed*60 : 0;
            let extra = overtime>0 ? `${Math.floor(overtime/60)}س ${overtime%60}د` : "-";
            let inAllowed=(isRamadan?RAMADAN_FROM:NORMAL_FROM), outAllowed=(isRamadan?RAMADAN_TO:NORMAL_TO);
            let delay = diffMinutes(inAllowed,inTime)>0 ? `${diffMinutes(inAllowed,inTime)} د تأخير` : "";
            let early = checkout&&diffMinutes(outTime,outAllowed)>0 ? `${diffMinutes(outTime,outAllowed)} د خروج مبكر` : "";
            let status = (!delay&&!early)?"✔️ صحيح":`${delay}${early?" / "+early:""}`;
            csv += `${name},${branch},${date},${inTime},${outTime},${duration>0?Math.floor(duration/60)+":"+(duration%60).toString().padStart(2,'0'):"--"},${extra},${status}\n`;
        }
    }
    let blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
    let link=document.createElement('a');link.href=URL.createObjectURL(blob);link.download="attendance_report.csv";link.click();
}
</script>
</body>
</html>
